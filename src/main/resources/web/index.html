<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4efe9">
  <meta name="color-scheme" content="light">
  <title>Server Web Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-bg">
    <div class="login-brand">
      <div class="login-icon" aria-hidden="true"></div>
      <h1>Server Web Admin</h1>
      <p>Minecraft Server Control Panel</p>
    </div>
    <div class="login-card">
      <div class="input-group">
        <div>
          <div class="field-label">Username</div>
          <input id="login-username" class="input" type="text" autocomplete="off" spellcheck="false"
            placeholder="Enter your username…" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" style="width:100%">
        </div>
        <div>
          <div class="field-label">Password</div>
          <input id="login-password" class="input" type="password" autocomplete="off" spellcheck="false"
            placeholder="Enter your password…" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:0.75rem 1rem;font-size:0.875rem;margin-top:0.25rem;">Sign In</button>
      </div>
      <div id="login-error" style="display:none;color:var(--danger);font-size:0.75rem;margin-top:0.875rem;text-align:center;"></div>
    </div>
    <div class="login-footer">Server Web Admin &copy; 2026</div>
  </div>

  <!-- App Container -->
  <div id="app-container" class="app-container">
    <div class="app">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-brand">
          <span class="sidebar-brand-icon" aria-hidden="true"></span>
          <span class="sidebar-brand-text">Server Web Admin</span>
        </div>
        <div class="nav-section-title">Main</div>
        <button class="nav-btn active" data-page="dashboard" style="--nav-accent:#8cbfa8" onclick="switchPage('dashboard')" title="Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-btn" data-page="console" style="--nav-accent:#8baec2" onclick="switchPage('console')" title="Console">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span class="nav-label">Console</span>
        </button>
        <button class="nav-btn" data-page="files" style="--nav-accent:#a8c4d8" onclick="switchPage('files')" title="File Manager">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span class="nav-label">File Manager</span>
        </button>
        <button class="nav-btn" data-page="settings" style="--nav-accent:#a89ec4" onclick="switchPage('settings')" title="Settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="nav-label">Settings</span>
        </button>
        <div class="nav-section-title">Administration</div>
        <button class="nav-btn" data-page="players" style="--nav-accent:#8cbfa8" onclick="switchPage('players')" title="Players">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="nav-label">Players</span>
        </button>
        <button class="nav-btn" data-page="whitelist" style="--nav-accent:#dbbc7c" onclick="switchPage('whitelist')" title="Whitelist">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
          <span class="nav-label">Whitelist</span>
        </button>
        <button class="nav-btn" data-page="bans" style="--nav-accent:#e49494" onclick="switchPage('bans')" title="Bans">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="8" y1="11" x2="16" y2="11"/></svg>
          <span class="nav-label">Bans</span>
        </button>
        <div class="nav-section-title">Management</div>
        <button class="nav-btn" data-page="users" style="--nav-accent:#a89ec4" onclick="switchPage('users')" title="Users">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="nav-label">Users</span>
        </button>
        <div style="margin-top:auto;">
          <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
          </button>
          <div class="theme-toggle">
            <span class="theme-toggle-label">Dark mode</span>
            <button class="theme-sw" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
          </div>
          <button class="nav-btn" onclick="doLogout()" style="color:var(--text-muted);">
            <span class="nav-label">Logout</span>
          </button>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="main-area">
        <section id="page-dashboard" class="page active"></section>
        <section id="page-console" class="page"></section>
        <section id="page-files" class="page"></section>
        <section id="page-settings" class="page"></section>
        <section id="page-players" class="page"></section>
        <section id="page-bans" class="page"></section>
        <section id="page-whitelist" class="page"></section>
        <section id="page-users" class="page"></section>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">Server Web Admin &copy; 2026</footer>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Teleport Modal -->
  <div id="tp-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="tp-modal-title">
    <div class="modal">
      <button class="modal-close" onclick="closeTeleportModal()" aria-label="Close">&times;</button>
      <h3 id="tp-modal-title">Teleport Player</h3>
      <p id="tp-modal-desc"></p>
      <label for="tp-target" class="sr-only">Target player name</label>
      <input id="tp-target" class="input" type="text" autocomplete="off" spellcheck="false" placeholder="Enter target player name…" style="width:100%">
      <div class="modal-actions">
        <button class="btn" style="background:var(--modal-cancel-bg);color:var(--text);" onclick="closeTeleportModal()">Cancel</button>
        <button class="btn btn-primary" onclick="doTeleport()">Teleport</button>
      </div>
    </div>
  </div>

  <!-- Go To Modal -->
  <div id="goto-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="goto-modal-title">
    <div class="modal">
      <button class="modal-close" onclick="closeGoToModal()" aria-label="Close">&times;</button>
      <h3 id="goto-modal-title">Go To Player</h3>
      <p id="goto-modal-desc"></p>
      <label for="goto-admin" class="sr-only">Your player name</label>
      <input id="goto-admin" class="input" type="text" autocomplete="off" spellcheck="false" placeholder="Enter your player name…" style="width:100%">
      <div class="modal-actions">
        <button class="btn" style="background:var(--modal-cancel-bg);color:var(--text);" onclick="closeGoToModal()">Cancel</button>
        <button class="btn btn-primary" onclick="doGoTo()">Go To</button>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div id="changepw-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="changepw-modal-title">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('changepw-modal').classList.remove('show')" aria-label="Close">&times;</button>
      <h3 id="changepw-modal-title">Change Password</h3>
      <p style="font-size:0.8125rem;color:var(--danger);margin-bottom:1rem;">You are using the default password. Please change it now.</p>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <label for="changepw-old" class="sr-only">Current Password</label>
        <input id="changepw-old" class="input" type="password" autocomplete="off" spellcheck="false" placeholder="Current password…" style="width:100%">
        <label for="changepw-new" class="sr-only">New Password</label>
        <input id="changepw-new" class="input" type="password" autocomplete="off" spellcheck="false" placeholder="New password…" style="width:100%">
        <label for="changepw-confirm" class="sr-only">Confirm New Password</label>
        <input id="changepw-confirm" class="input" type="password" autocomplete="off" spellcheck="false" placeholder="Confirm new password…" onkeydown="if(event.key==='Enter')doChangePassword()" style="width:100%">
      </div>
      <div id="changepw-error" style="display:none;color:var(--danger);font-size:0.75rem;margin-top:0.75rem;"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="doChangePassword()" style="width:100%;justify-content:center;">Change Password</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
    <div class="modal">
      <h3 id="confirm-modal-title"></h3>
      <p id="confirm-modal-msg" style="font-size:0.875rem;color:var(--text-muted);margin-bottom:0;"></p>
      <div id="confirm-modal-input-wrap" style="display:none;margin-top:0.875rem;">
        <label for="confirm-modal-reason" class="sr-only">Reason</label>
        <input id="confirm-modal-reason" class="input" type="text" autocomplete="off" spellcheck="false"
          placeholder="Reason…" style="width:100%" oninput="document.getElementById('confirm-modal-btn').disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter')doConfirm()">
      </div>
      <div class="modal-actions">
        <button class="btn" style="background:var(--modal-cancel-bg);color:var(--text);" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn btn-danger" id="confirm-modal-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
